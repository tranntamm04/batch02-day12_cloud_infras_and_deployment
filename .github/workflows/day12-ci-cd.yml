name: Day 12 CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/day12-ci-cd.yml"
  pull_request:
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/day12-ci-cd.yml"
  workflow_dispatch:

env:
  PROJECT_DIR: 06-lab-complete
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m compileall codebase/src

      - name: Production readiness static check
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python check_production_ready.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/codebase/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/codebase/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.PROJECT_DIR }}/codebase/frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker build -t moni-finance-agent:${{ github.sha }} .

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when hook is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured; CI passed, deploy skipped."
