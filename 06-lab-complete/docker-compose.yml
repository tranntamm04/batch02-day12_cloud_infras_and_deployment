version: "3.9"

services:
  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      APP_NAME: Moni Finance Agent
      APP_VERSION: 1.0.0
      REDIS_URL: redis://redis:6379/0
      DEFAULT_PROVIDER: openai
      DEFAULT_MODEL: gpt-4o
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      AGENT_API_KEY: dev-key-change-me
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD:-5.0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
